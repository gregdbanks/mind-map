<!doctype html>
<html lang="en">
  <head>
    <!-- Google Analytics 4 — loaded only when VITE_GA_MEASUREMENT_ID is configured -->
    <script>
      (function () {
        var GA_MEASUREMENT_ID = '%VITE_GA_MEASUREMENT_ID%';
        if (
          !GA_MEASUREMENT_ID ||
          GA_MEASUREMENT_ID === '%' + 'VITE_GA_MEASUREMENT_ID%'
        ) {
          return;
        }
        var gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(GA_MEASUREMENT_ID);
        document.head.appendChild(gtagScript);
        window.dataLayer = window.dataLayer || [];
        function gtag(){window.dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', GA_MEASUREMENT_ID);
      })();
    </script>
    <meta charset="UTF-8" />
